services:
  postgres:
    image: postgres:15
    container_name: tool87-postgres
    environment:
      POSTGRES_DB: tool87
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tool87"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: redis:7
    container_name: tool87-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tool87-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: tool87
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD:
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: your_email@example.com
      MAIL_PASSWORD: your_email_app_password
      MAIL_SMTP_AUTH: "true"
      MAIL_SMTP_STARTTLS_ENABLE: "true"
      MAIL_FROM: noreply@tool87.local
      JWT_SECRET: change-me-secure-secret
      JWT_ACCESS_TOKEN_EXPIRATION_MS: 900000
      JWT_REFRESH_TOKEN_EXPIRATION_MS: 604800000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      FRONTEND_URL: http://localhost:5173
      NOTIFICATION_DAILY_CRON: 0 0 9 * * *
      NOTIFICATION_TIME_ZONE: Asia/Calcutta
      DEADLINE_ALERT_DAYS: 1
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: tool87-ai-service
    environment:
      FLASK_APP: app.py
      FLASK_ENV: production
      PORT: 5000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tool87-frontend
    depends_on:
      backend:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: http://localhost:8081
      VITE_AI_SERVICE_URL: http://localhost:5000
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
